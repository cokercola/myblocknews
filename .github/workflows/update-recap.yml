name: Update recap
on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust the cron if you'd like a different time.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too
jobs:
  update-recap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate daily recap
        run: node scripts/generate-recap.js
      - name: Commit updated recap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recap.json
          git diff --staged --quiet || git commit -m "Update daily recap"
          git push
