name: Update block brief

on:
  schedule:
    # Runs once a day at 8am UTC. Adjust the cron if you want a different time.
    - cron: "0 8 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

jobs:
  update-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update date and biggest movers
        run: node scripts/fetch-brief.js

      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brief.json
          git diff --staged --quiet || git commit -m "Update block brief date and movers"
          git push
